<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해빛 투게더 "별 둘, 소망 하나"</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --sky-dark: #0a1628;
    --sky-mid: #1a2d5a;
    --sky-light: #2a4a8c;
    --star-blue: #87ceeb;
    --star-yellow: #ffd700;
    --heart-pink: #ff69b4;
    --accent-teal: #4ecdc4;
    --text-light: #e8eaf6;
    --text-muted: #9ca3c8;
    --card-bg: rgba(255,255,255,0.07);
    --card-border: rgba(255,255,255,0.15);
    --input-bg: rgba(255,255,255,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--sky-dark);
    color: var(--text-light);
    min-height: 100vh;
  }

  /* ── STARS BACKGROUND ── */
  #stars-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-star {
    position: absolute; border-radius: 50%;
    background: white; opacity: 0.5; animation: twinkle 3s infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.8; } }

  /* ── LAYOUT ── */
  #app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }

  /* ── HEADER ── */
  header {
    text-align: center; padding: 2rem 1rem 1.5rem;
    border-bottom: 1px solid var(--card-border); margin-bottom: 2rem;
  }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.05em; }
  header h1 span.s1 { color: var(--star-blue); }
  header h1 span.s2 { color: var(--star-yellow); }
  header h1 span.heart { color: var(--heart-pink); }
  .user-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--card-bg); border: 1px solid var(--card-border);
    padding: 6px 14px; border-radius: 999px; font-size: 0.85rem;
    margin-top: 0.75rem; cursor: pointer;
  }
  .user-badge:hover { background: rgba(255,255,255,0.12); }

  /* ── CARDS ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px; padding: 1.5rem;
    backdrop-filter: blur(8px);
  }
  .card + .card { margin-top: 1.2rem; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 20px; border-radius: 10px; border: none;
    font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent-teal); color: #0a1628; }
  .btn-primary:hover { background: #3bbdb4; }
  .btn-danger { background: rgba(255,80,80,0.2); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.3); }
  .btn-danger:hover { background: rgba(255,80,80,0.35); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--card-border); }
  .btn-ghost:hover { background: var(--card-bg); color: var(--text-light); }

  /* ── INPUTS ── */
  input, textarea, select {
    width: 100%; padding: 10px 14px;
    background: var(--input-bg); border: 1px solid var(--card-border);
    border-radius: 10px; color: var(--text-light); font-size: 0.95rem;
    transition: border-color 0.2s; font-family: inherit;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent-teal);
  }
  select option { background: #1a2d5a; color: var(--text-light); }
  textarea { resize: vertical; min-height: 80px; }
  label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }

  /* ── PUBLIC TABS (header) ── */
  .pub-tab {
    padding: 6px 16px; border-radius: 999px; border: 1px solid var(--card-border);
    background: var(--card-bg); color: var(--text-muted); font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s;
  }
  .pub-tab:hover { background: rgba(255,255,255,0.12); color: var(--text-light); }

  /* ── SCREEN LOGIC ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── LOGIN ── */
  #screen-login { max-width: 380px; margin: 4rem auto; }
  #screen-login .logo { text-align: center; font-size: 3rem; margin-bottom: 1rem; }
  #screen-login h2 { text-align: center; font-size: 1.4rem; margin-bottom: 2rem; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 6px; margin-bottom: 1.2rem; }
  .tab {
    flex: 1; padding: 9px; text-align: center; border-radius: 10px;
    border: 1px solid var(--card-border); background: transparent;
    color: var(--text-muted); font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: var(--card-bg); color: var(--text-light); border-color: var(--accent-teal); }

  /* ── SKY VIEW ── */
  #sky-canvas-wrap {
    background: linear-gradient(180deg, #050d1f 0%, #0f1f4a 50%, #1a3580 100%);
    border-radius: 16px; padding: 1.5rem; min-height: 220px;
    position: relative; overflow: hidden;
  }
  .sky-date-label {
    font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; text-align: center;
  }
  #sky-items { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 0.5rem; }
  .sky-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; transition: transform 0.2s;
  }
  .sky-item:hover { transform: scale(1.2); }
  .sky-item .icon { font-size: 1.6rem; animation: float 4s ease-in-out infinite alternate; }
  .sky-item .name { font-size: 0.7rem; color: var(--text-muted); }
  @keyframes float { from { transform: translateY(0); } to { transform: translateY(-5px); } }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 1rem;
  }
  #modal-overlay.hidden { display: none; }
  .modal-box {
    background: #1a2d5a; border: 1px solid var(--card-border);
    border-radius: 16px; padding: 1.5rem; max-width: 480px; width: 100%;
    max-height: 80vh; overflow-y: auto;
  }
  .modal-box h3 { margin-bottom: 1rem; font-size: 1.1rem; }
  .modal-entry { margin-bottom: 0.8rem; padding: 0.8rem; background: var(--card-bg); border-radius: 10px; }
  .modal-entry-label { font-size: 0.78rem; color: var(--text-muted); }
  .modal-entry-text { font-size: 0.95rem; margin-top: 4px; line-height: 1.5; }

  /* ── COLLECTION VIEW TABS ── */
  .c-tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
  .c-tab {
    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--card-border);
    background: transparent; color: var(--text-muted); font-size: 0.82rem; cursor: pointer;
  }
  .c-tab.active.blue { background: rgba(135,206,235,0.2); color: var(--star-blue); border-color: var(--star-blue); }
  .c-tab.active.yellow { background: rgba(255,215,0,0.2); color: var(--star-yellow); border-color: var(--star-yellow); }
  .c-tab.active.pink { background: rgba(255,105,180,0.2); color: var(--heart-pink); border-color: var(--heart-pink); }

  .c-entry {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 12px; border-radius: 10px; margin-bottom: 8px;
    background: var(--card-bg); border: 1px solid var(--card-border);
  }
  .c-entry .icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
  .c-entry .c-name { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; }
  .c-entry .c-text { font-size: 0.9rem; line-height: 1.5; margin-top: 2px; }

  /* ── ADMIN ── */
  .admin-section { margin-bottom: 2rem; }
  .admin-section h3 { font-size: 1rem; color: var(--accent-teal); margin-bottom: 1rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem; }
  .topic-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 10px; margin-bottom: 6px;
  }
  .student-row {
    display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px;
    align-items: center; padding: 8px 12px; background: var(--card-bg);
    border: 1px solid var(--card-border); border-radius: 10px; margin-bottom: 6px;
    font-size: 0.88rem;
  }

  /* ── REFLECTION FORM ── */
  .reflect-section { margin-bottom: 1.2rem; }
  .reflect-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem;
  }
  .reflect-label .icon { font-size: 1.2rem; }

  /* ── MSG ── */
  .msg {
    padding: 10px 14px; border-radius: 10px; font-size: 0.88rem;
    margin-top: 0.8rem; display: none;
  }
  .msg.show { display: block; }
  .msg.success { background: rgba(78,205,196,0.2); color: #4ecdc4; border: 1px solid rgba(78,205,196,0.3); }
  .msg.error { background: rgba(255,80,80,0.2); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.3); }

  /* ── UTIL ── */
  .flex { display: flex; }
  .gap-sm { gap: 8px; }
  .gap-md { gap: 14px; }
  .mt-sm { margin-top: 0.6rem; }
  .mt-md { margin-top: 1rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .text-muted { color: var(--text-muted); font-size: 0.85rem; }
  .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; }

  /* ── MY RECORD ── */
  .record-card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 1.2rem; margin-bottom: 10px;
    cursor: pointer; transition: transform 0.15s, border-color 0.15s;
  }
  .record-card:hover { transform: translateY(-2px); border-color: var(--accent-teal); }
  .record-card .rc-date { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
  .record-card .rc-topic { font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; }
  .record-card .rc-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
  .record-card .rc-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .record-card .rc-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  /* ── RECORD DETAIL MODAL ── */
  #record-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 1rem;
  }
  #record-modal-overlay.hidden { display: none; }
  .record-modal-box {
    background: #1a2d5a; border: 1px solid var(--card-border);
    border-radius: 20px; padding: 1.8rem; max-width: 520px; width: 100%;
    max-height: 85vh; overflow-y: auto;
  }
  .record-modal-box .rm-date { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
  .record-modal-box .rm-topic { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.2rem; }
  .record-modal-box .rm-section { margin-bottom: 1rem; padding: 0.9rem 1rem;
    background: var(--card-bg); border-radius: 12px; }
  .record-modal-box .rm-label { font-size: 0.78rem; margin-bottom: 5px; font-weight: 600; }
  .record-modal-box .rm-content { font-size: 0.95rem; line-height: 1.6; }

  @media (max-width: 480px) {
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ══════════ RECORD DETAIL MODAL ══════════ -->
<div id="record-modal-overlay" class="hidden">
  <div class="record-modal-box">
    <div class="rm-date" id="rm-date"></div>
    <div class="rm-topic" id="rm-topic"></div>
    <div class="rm-section">
      <div class="rm-label" style="color:var(--star-blue)">★ 별 하나 — 알게 된 점</div>
      <div class="rm-content" id="rm-star1"></div>
    </div>
    <div class="rm-section">
      <div class="rm-label" style="color:var(--star-yellow)">★ 별 둘 — 느낀 점</div>
      <div class="rm-content" id="rm-star2"></div>
    </div>
    <div class="rm-section">
      <div class="rm-label" style="color:var(--heart-pink)">♥ 소망 하나</div>
      <div class="rm-content" id="rm-wish"></div>
    </div>
    <div class="mt-md">
      <button class="btn btn-ghost" onclick="closeRecordModal()">닫기</button>
    </div>
  </div>
</div>

<div id="stars-bg"></div>

<!-- ══════════ MODAL ══════════ -->
<div id="modal-overlay" class="hidden">
  <div class="modal-box">
    <h3 id="modal-title">성찰 내용</h3>
    <div id="modal-body"></div>
    <div class="mt-md">
      <button class="btn btn-ghost" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <h1>해빛 투게더 <span style="font-size:1.1rem;font-weight:400;color:var(--text-muted)">"</span><span class="s1">별</span> <span class="s2">둘</span><span style="font-size:1.1rem;font-weight:400;color:var(--text-muted)">,</span> <span class="heart">소망 하나</span><span style="font-size:1.1rem;font-weight:400;color:var(--text-muted)">"</span></h1>
    <div style="margin-top:0.8rem;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap">
      <button class="pub-tab" onclick="showPublicTab('pub-sky')">🌌 오늘의 하늘</button>
      <button class="pub-tab" onclick="showPublicTab('pub-collect')">📚 모아보기</button>
      <button class="pub-tab" id="home-btn" style="display:none" onclick="goHome()">🏠 홈으로</button>
      <div id="user-badge-wrap" style="display:none">
        <span class="user-badge" onclick="logout()">
          <span id="badge-name">-</span>
          <span style="color:var(--text-muted);font-size:0.75rem">로그아웃</span>
        </span>
      </div>
    </div>
  </header>

  <!-- ══ PUBLIC SKY ══ -->
  <div id="screen-pub-sky" class="screen">
    <div class="card">
      <div class="reflect-section">
        <label>날짜 선택</label>
        <input type="date" id="pub-sky-date">
      </div>
    </div>
    <div class="mt-sm">
      <div id="pub-sky-canvas-wrap" style="background:linear-gradient(180deg,#050d1f 0%,#0f1f4a 50%,#1a3580 100%);border-radius:16px;padding:1.5rem;min-height:220px;position:relative;overflow:hidden">
        <div class="sky-date-label" id="pub-sky-date-label">날짜를 선택하면 하늘이 펼쳐집니다 ✨</div>
        <div id="pub-sky-items" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:0.5rem"></div>
      </div>
    </div>
    <div class="mt-md"><button class="btn btn-ghost" onclick="goHome()">🏠 홈으로</button></div>
  </div>

  <!-- ══ PUBLIC COLLECT ══ -->
  <div id="screen-pub-collect" class="screen">
    <div class="card">
      <div class="reflect-section">
        <label>학습 문제</label>
        <select id="pub-collect-topic">
          <option value="">-- 학습 문제를 선택하세요 --</option>
        </select>
      </div>
    </div>
    <div class="mt-sm" id="pub-collect-result"></div>
    <div class="mt-md"><button class="btn btn-ghost" onclick="goHome()">🏠 홈으로</button></div>
  </div>

  <!-- ══ LOGIN SCREEN ══ -->
  <div id="screen-login" class="screen active">
    <div class="logo">🌟</div>
    <h2>마음에 새기는 오늘의 탐구</h2>
    <div class="card">
      <div class="reflect-section">
        <label>이름</label>
        <input id="login-name" type="text" placeholder="이름을 입력하세요">
      </div>
      <div class="reflect-section">
        <label>비밀번호</label>
        <input id="login-pw" type="password" placeholder="비밀번호">
      </div>
      <div class="msg" id="login-msg"></div>
      <div class="mt-md">
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">입장하기 ✨</button>
      </div>
    </div>
  </div>

  <!-- ══ STUDENT SCREEN ══ -->
  <div id="screen-student" class="screen">
    <div class="tabs">
      <button class="tab active" data-tab="write" onclick="switchTab(this,'write')">✏️ 성찰 쓰기</button>
      <button class="tab" data-tab="sky" onclick="switchTab(this,'sky')">🌌 오늘의 하늘</button>
      <button class="tab" data-tab="collect" onclick="switchTab(this,'collect')">📚 모아보기</button>
      <button class="tab" data-tab="myrecord" onclick="switchTab(this,'myrecord')">📖 나의 성찰 기록</button>
    </div>

    <!-- WRITE TAB -->
    <div id="tab-write" class="tab-content">
      <div class="card">
        <div class="reflect-section">
          <label>학습 문제 선택</label>
          <select id="topic-select">
            <option value="">-- 학습 문제를 선택하세요 --</option>
          </select>
        </div>
      </div>

      <div class="card mt-sm">
        <div class="reflect-section">
          <div class="reflect-label"><span class="icon" style="color:var(--star-blue)">★</span> 별 하나 — 알게 된 점</div>
          <textarea id="star1" placeholder="오늘 수업에서 새롭게 알게 된 것을 써보세요..."></textarea>
        </div>
        <div class="reflect-section">
          <div class="reflect-label"><span class="icon" style="color:var(--star-yellow)">★</span> 별 둘 — 느낀 점</div>
          <textarea id="star2" placeholder="오늘 수업에서 느낀 점을 써보세요..."></textarea>
        </div>
        <div class="reflect-section">
          <div class="reflect-label"><span class="icon" style="color:var(--heart-pink)">♥</span> 소망 하나 — 원하는 것</div>
          <textarea id="wish" placeholder="앞으로 원하는 것, 바라는 것을 써보세요..."></textarea>
        </div>
        <div class="msg" id="write-msg"></div>
        <div class="mt-md flex gap-sm">
          <button class="btn btn-primary" onclick="submitReflection()">하늘에 달기 🌟</button>
        </div>
      </div>
    </div>

    <!-- SKY TAB -->
    <div id="tab-sky" class="tab-content" style="display:none">
      <div class="card">
        <div class="reflect-section">
          <label>날짜 선택</label>
          <input type="date" id="sky-date">
        </div>
      </div>
      <div class="mt-sm">
        <div id="sky-canvas-wrap">
          <div class="sky-date-label" id="sky-date-label">날짜를 선택하면 하늘이 펼쳐집니다 ✨</div>
          <div id="sky-items"></div>
        </div>
      </div>
    </div>

    <!-- COLLECT TAB -->
    <div id="tab-collect" class="tab-content" style="display:none">
      <div class="card">
        <div class="reflect-section">
          <label>학습 문제</label>
          <select id="collect-topic">
            <option value="">-- 학습 문제를 선택하세요 --</option>
          </select>
        </div>
      </div>
      <div class="mt-sm" id="collect-result"></div>
    </div>

    <!-- MY RECORD TAB -->
    <div id="tab-myrecord" class="tab-content" style="display:none">
      <div id="myrecord-list"></div>
    </div>
  </div>

  <!-- ══ ADMIN SCREEN ══ -->
  <div id="screen-admin" class="screen">
    <div class="tabs">
      <button class="tab active" data-tab="a-topics" onclick="switchTab(this,'a-topics')">📋 학습 문제</button>
      <button class="tab" data-tab="a-students" onclick="switchTab(this,'a-students')">👥 학생 관리</button>
      <button class="tab" data-tab="a-entries" onclick="switchTab(this,'a-entries')">📝 성찰 관리</button>
    </div>

    <!-- ADMIN: TOPICS -->
    <div id="tab-a-topics" class="tab-content">
      <div class="card admin-section">
        <h3>새 학습 문제 추가</h3>
        <div class="grid-2">
          <div>
            <label>학습 문제</label>
            <input id="new-topic" type="text" placeholder="예: 조선의 건국 배경">
          </div>
          <div>
            <label>날짜</label>
            <input id="new-topic-date" type="date">
          </div>
        </div>
        <div class="mt-sm">
          <button class="btn btn-primary" onclick="addTopic()">추가하기</button>
        </div>
        <div class="msg" id="topic-msg"></div>
      </div>
      <div class="card admin-section">
        <h3>학습 문제 목록</h3>
        <div id="topic-list">
          <div class="empty-state">학습 문제가 없습니다.</div>
        </div>
      </div>
    </div>

    <!-- ADMIN: STUDENTS -->

async function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  if (!name || !pw) return showMsg('login-msg', '이름과 비밀번호를 입력하세요.', 'error');

  if (name === '선생님' && pw === ADMIN_PW) {
    currentUser = { id: 'admin', name: '선생님', role: 'admin' };
    sessionStorage.setItem('user', JSON.stringify(currentUser));
    afterLogin();
    return;
  }

  const { data, error } = await sb.from('students')
    .select('*').eq('name', name).eq('password', pw).single();

  if (error || !data) return showMsg('login-msg', '이름 또는 비밀번호가 올바르지 않습니다.', 'error');

  currentUser = { id: data.id, name: data.name, role: 'student' };
  sessionStorage.setItem('user', JSON.stringify(currentUser));
  afterLogin();
}

function afterLogin() {
  document.getElementById('badge-name').textContent = currentUser.name;
  document.getElementById('user-badge-wrap').style.display = 'block';
  showScreen(currentUser.role === 'admin' ? 'admin' : 'student');
  if (currentUser.role === 'student') {
    loadTopics();
  } else {
    loadAdminTopics();
    loadAdminStudents();
  }
}

function logout() {
  sessionStorage.removeItem('user');
  currentUser = null;
  document.getElementById('user-badge-wrap').style.display = 'none';
  showScreen('login');
}

  const parent = btn.closest('.screen, #app');
  const prefix = tabId.startsWith('a-') ? 'tab-a-' : 'tab-';

  parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  parent.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + tabId).style.display = 'block';

  if (tabId === 'sky') loadSkyView();

async function submitReflection() {
  const topic_id = document.getElementById('topic-select').value;
  const star1 = document.getElementById('star1').value.trim();
  const star2 = document.getElementById('star2').value.trim();
  const wish = document.getElementById('wish').value.trim();

  if (!topic_id) return showMsg('write-msg', '학습 문제를 선택하세요.', 'error');
  if (!star1 || !star2 || !wish) return showMsg('write-msg', '모든 항목을 작성해 주세요.', 'error');

  const today = new Date().toISOString().split('T')[0];
  const { error } = await sb.from('reflections').upsert({
    student_id: currentUser.id,
    topic_id,
    date: today,
    star1, star2, wish
  }, { onConflict: 'student_id,topic_id' });

  if (error) return showMsg('write-msg', '저장 중 오류가 발생했습니다.', 'error');
  showMsg('write-msg', '🌟 하늘에 별이 달렸어요!', 'success');
  document.getElementById('star1').value = '';
  document.getElementById('star2').value = '';
  document.getElementById('wish').value = '';
}

  btn.parentElement.querySelectorAll('.c-tab').forEach(t => {
    t.classList.remove('active','blue','yellow','pink');
  });
  const base = id.replace(/^pc/, 'c'); // pc1→c1, pc2→c2 등 정규화
  const colors = { c1: 'blue', c2: 'yellow', c3: 'pink' };
  btn.classList.add('active', colors[base]);
  // 같은 부모 안에서만 탭 전환 (pc1/pc2/pc3 또는 c1/c2/c3)
  const prefix = id.startsWith('pc') ? 'pc' : 'c';

    const el = document.getElementById(prefix + n);
    if (el) el.style.display = (prefix + n) === id ? 'block' : 'none';

        <div>
          <strong>${r.students?.name || '-'}</strong>
          <span class="text-muted" style="margin-left:8px">${r.topics?.title || '-'} · ${r.date}</span>
        </div>
        <button class="btn btn-danger" style="padding:5px 12px;font-size:0.8rem" onclick="deleteEntry('${r.id}', this)">삭제</button>
      </div>
      <div style="display:grid;gap:6px">
        <div class="modal-entry"><div class="modal-entry-label" style="color:var(--star-blue)">★ 별 하나 — 알게 된 점</div><div class="modal-entry-text">${r.star1 || '-'}</div></div>
        <div class="modal-entry"><div class="modal-entry-label" style="color:var(--star-yellow)">★ 별 둘 — 느낀 점</div><div class="modal-entry-text">${r.star2 || '-'}</div></div>
        <div class="modal-entry"><div class="modal-entry-label" style="color:var(--heart-pink)">♥ 소망 하나</div><div class="modal-entry-text">${r.wish || '-'}</div></div>
      </div>
    `;
    list.appendChild(card);
  });
}

async function deleteEntry(id, btn) {
  if (!confirm('이 성찰 일지를 삭제할까요?')) return;
  await sb.from('reflections').delete().eq('id', id);
  btn.closest('.card').remove();
}

// ══════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════
function openModal(title, entries) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = entries.map(e =>
    `<div class="modal-entry"><div class="modal-entry-label">${e.label}</div><div class="modal-entry-text">${e.text}</div></div>`
  ).join('');
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ══════════════════════════════════════════
//  MY RECORD
// ══════════════════════════════════════════
async function loadMyRecord() {
  const list = document.getElementById('myrecord-list');
  list.innerHTML = '<div class="empty-state">불러오는 중...</div>';

  const { data } = await sb.from('reflections')
    .select('*, topics(title, date)')
    .eq('student_id', currentUser.id)
    .order('created_at', { ascending: false });

  list.innerHTML = '';
  if (!data || data.length === 0) {
    list.innerHTML = '<div class="empty-state">아직 작성한 성찰 일지가 없어요.</div>'; return;
  }

  data.forEach(r => {
    const card = document.createElement('div');
    card.className = 'record-card';
    card.innerHTML = `
      <div class="rc-date">${r.date} &nbsp;·&nbsp; ${r.topics?.date || ''}</div>
      <div class="rc-topic">📌 ${r.topics?.title || '학습 문제 없음'}</div>
      <div class="rc-row"><span class="rc-icon" style="color:var(--star-blue)">★</span><div class="rc-text">${r.star1 || '-'}</div></div>
      <div class="rc-row"><span class="rc-icon" style="color:var(--star-yellow)">★</span><div class="rc-text">${r.star2 || '-'}</div></div>
      <div class="rc-row"><span class="rc-icon" style="color:var(--heart-pink)">♥</span><div class="rc-text">${r.wish || '-'}</div></div>
    `;
    card.onclick = () => openRecordModal(r);
    list.appendChild(card);
  });
}

function openRecordModal(r) {
  document.getElementById('rm-date').textContent = r.date;
  document.getElementById('rm-topic').textContent = '📌 ' + (r.topics?.title || '학습 문제 없음');
  document.getElementById('rm-star1').textContent = r.star1 || '-';
  document.getElementById('rm-star2').textContent = r.star2 || '-';
  document.getElementById('rm-wish').textContent = r.wish || '-';
  document.getElementById('record-modal-overlay').classList.remove('hidden');
}

function closeRecordModal() {
  document.getElementById('record-modal-overlay').classList.add('hidden');
}

document.addEventListener('click', e => {
  if (e.target === document.getElementById('record-modal-overlay')) closeRecordModal();
});

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = 'msg ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3500);
}
</script>

</html>
